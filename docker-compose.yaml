
services:

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "5000:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
      - backend4
    networks:
      - student-repo-network

  frontend:
    build: ./client 
    image: student-repo-client
    ports:
      - "5173:5173"
    environment:
      - VITE_SERVER_URL=http://localhost:5000
    networks:
      - student-repo-network
    
  backend1:
    container_name: server1
    build: ./server
    image: student-repo-server
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - SECRET_KEY=mykey123
      - MONGODBURL=mongodb://root:root@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb
    networks:
      - student-repo-network

  backend2:
    container_name: server2
    build: ./server
    image: student-repo-server
    ports:
      - "5002:5000"
    environment:
      - PORT=5000
      - SECRET_KEY=mykey123
      - MONGODBURL=mongodb://root:root@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb
    networks:
      - student-repo-network

  backend3:
    container_name: server3
    build: ./server
    image: student-repo-server
    ports:
      - "5003:5000"
    environment:
      - PORT=5000
      - SECRET_KEY=mykey123
      - MONGODBURL=mongodb://root:root@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb
    networks:
      - student-repo-network

  backend4:
    container_name: server4
    build: ./server
    image: student-repo-server
    ports:
      - "5004:5000"
    environment:
      - PORT=5000
      - SECRET_KEY=mykey123
      - MONGODBURL=mongodb://root:root@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb
    networks:
      - student-repo-network
    
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    volumes:
      - mongo-data:/data/db
    networks:
      - student-repo-network

networks:
  student-repo-network:
    driver: bridge

volumes:
  mongo-data: